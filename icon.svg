<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景底板 -->
  <rect width="128" height="128" rx="24" fill="#165DFF" fill-opacity="0.1"/>
  <rect x="4" y="4" width="120" height="120" rx="20" fill="#165DFF" fill-opacity="0.2"/>
  
  <!-- 工具插件外框 -->
  <rect x="16" y="16" width="96" height="96" rx="12" fill="none" stroke="#165DFF" stroke-width="3"/>
  
  <!-- 工具齿轮元素 -->
  <circle cx="64" cy="64" r="32" fill="none" stroke="#4D96FF" stroke-width="2" stroke-dasharray="4 2"/>
  <circle cx="64" cy="64" r="24" fill="#165DFF" fill-opacity="0.8"/>
  
  <!-- 文字：方寸 -->
  <text x="64" y="70" font-family="Arial, SimHei, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#FFFFFF">方寸</text>
</svg>
